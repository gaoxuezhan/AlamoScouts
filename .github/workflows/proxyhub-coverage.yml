name: ProxyHub Coverage

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ProxyHub 100% coverage gate
        run: npm run test:proxyhub:coverage
