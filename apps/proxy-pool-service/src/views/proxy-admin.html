<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProxyHub 管理页</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121c31;
      --panel2: #1b2744;
      --text: #e6edf8;
      --muted: #9eb1d8;
      --ok: #2dd4bf;
      --warn: #f59e0b;
      --bad: #ef4444;
      --line: #2f4069;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #132447, #0b1220 45%);
    }
    header { padding: 20px 24px; border-bottom: 1px solid var(--line); }
    h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
    .sub { color: var(--muted); margin-top: 6px; font-size: 13px; }
    main { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; padding: 14px; }
    .card { background: linear-gradient(180deg, var(--panel), var(--panel2)); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; min-height: 180px; }
    .card h2 { margin: 0; padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 15px; color: #c9d9f8; }
    .card .content { padding: 12px 14px; max-height: 360px; overflow: auto; }
    .wide-section { padding: 0 14px 14px; }
    .wide-card { min-height: 0; }
    .wide-card .content { max-height: 520px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat { border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .stat .k { font-size: 12px; color: var(--muted); }
    .stat .v { font-size: 20px; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid var(--line); padding: 6px 4px; text-align: left; }
    th { color: var(--muted); font-weight: 600; }
    th[title] { cursor: help; text-decoration: underline dotted rgba(158, 177, 216, 0.7); text-underline-offset: 2px; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    .mono { font-family: Consolas, monospace; }
    .pill { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; margin-right: 6px; margin-bottom: 6px; font-size: 12px; }
    footer { padding: 0 14px 14px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>ProxyHub 线程池与军衔管理台</h1>
    <div class="sub">刷新周期 __REFRESH_MS__ms | 页面地址 /proxy-admin | 日志页 /runtime/logs</div>
  </header>

  <main>
    <section class="card">
      <h2>线程池实时状态</h2>
      <div class="content">
        <div id="poolStats" class="stats"></div>
        <table id="workerTable"></table>
      </div>
    </section>

    <section class="card">
      <h2>来源分布 / 生命周期 / 现役军衔分布 / 新兵训练营 / 已退役</h2>
      <div class="content"><div id="distributions"></div></div>
    </section>

    <section class="card"><h2>荣誉墙</h2><div class="content"><table id="honorTable"></table></div></section>
    <section class="card"><h2>事件流</h2><div class="content"><table id="eventTable"></table></div></section>
  </main>

  <section class="wide-section">
    <section class="card wide-card">
      <h2>IP价值榜（前100）</h2>
      <div class="content"><table id="valueBoardTable"></table></div>
    </section>
  </section>

  <footer><div>状态颜色：<span class="ok">正常</span> / <span class="warn">告警</span> / <span class="bad">异常</span></div></footer>

<script>
const workerTable = document.getElementById('workerTable');
const poolStats = document.getElementById('poolStats');
const distributions = document.getElementById('distributions');
const honorTable = document.getElementById('honorTable');
const valueBoardTable = document.getElementById('valueBoardTable');
const eventTable = document.getElementById('eventTable');

const FALLBACK_RANK_ORDER = ['新兵', '列兵', '士官', '尉官', '校官', '将官', '王牌'];

function fmt(n) { return n == null ? '-' : n; }
function esc(v) { return String(v == null ? '-' : v).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }
function fmtPercent(ratio) { return fmt(Number((Number(ratio || 0) * 100).toFixed(1))) + '%'; }
function fmtScore(value) { return fmt(Number(value || 0).toFixed(2)); }
function fmtLocalTime(iso) {
  const ms = Date.parse(iso);
  if (!Number.isFinite(ms)) return '-';
  return new Date(ms).toLocaleString('zh-CN', { hour12: false });
}
function buildRankHelp(ranks) {
  const order = Array.isArray(ranks)
    ? ranks.map(function(item){ return item && item.rank; }).filter(Boolean)
    : [];
  const finalOrder = order.length > 0 ? order : FALLBACK_RANK_ORDER;
  return '这是当前军衔等级。系统一共' + finalOrder.length + '个军衔，顺序是：' + finalOrder.join(' -> ') + '。越靠后通常代表综合表现越强。';
}
function getValueBoardHeaders(rankHelp) {
  return [
    { label: '排名', help: '按价值分从高到低排的名次，1就是当前最有价值的IP。' },
    { label: '姓名', help: '这个IP的显示名称，方便在日志和榜单里快速识别。' },
    { label: '编制', help: '该IP当前所属军种编制，用于体现兵种归属。' },
    { label: '军衔', help: rankHelp },
    { label: '价值分', help: '这是0到100的综合分，分数越高说明这个IP越值得优先使用。' },
    { label: '生命周期', help: '这个IP现在处于哪个阶段（候选/在役/预备/退役），决定它会不会被优先调度。' },
    { label: '成功率', help: '历史成功次数除以总样本数，反映总体能不能跑通。' },
    { label: '战场胜率', help: '战场测试里成功次数除以战场总次数，反映真实战场好不好用。' },
    { label: 'L0(成功/失败)', help: 'L0层的累计成功/失败次数，失败包含 blocked、timeout、network_error、invalid_feedback。' },
    { label: 'L1(成功/失败)', help: 'L1战场测试的累计成功/失败次数。' },
    { label: 'L2(成功/失败)', help: 'L2战场测试的累计成功/失败次数。' },
    { label: 'L3(成功/失败)', help: 'L3战场测试的累计成功/失败次数。' },
    { label: '激活荣誉', help: '当前生效中的荣誉标签，代表这个IP最近在某些维度表现突出。' },
    { label: '地址', help: 'IP、端口和协议组合地址，排障和复现问题时最直接。' },
    { label: '来源', help: '这个IP来自哪个抓取源，可用来判断源质量。' },
    { label: '更新时间', help: '这条记录最近一次被系统更新的时间，页面按本地时间显示。' },
    { label: '战功', help: '累计战斗积分，成功会加分，失败会扣分。' },
    { label: '健康', help: '稳定性评分，越高越稳，频繁超时或失败会下降。' },
    { label: '纪律', help: '合规与可控评分，异常反馈或违规信号会拉低。' },
    { label: '样本', help: '参与统计的总次数，样本越多，评分越可信。' },
  ];
}

function renderPool(status) {
  const high = Math.max(20, status.workersTotal * 8);
  const mid = Math.max(8, status.workersTotal * 3);
  const busyClass = status.queueSize > high ? 'bad' : status.queueSize > mid ? 'warn' : 'ok';
  poolStats.innerHTML = ''
    + '<div class="stat"><div class="k">总线程</div><div class="v">' + status.workersTotal + '</div></div>'
    + '<div class="stat"><div class="k">忙碌线程</div><div class="v">' + status.workersBusy + '</div></div>'
    + '<div class="stat"><div class="k">队列长度</div><div class="v ' + busyClass + '">' + status.queueSize + '</div></div>'
    + '<div class="stat"><div class="k">重启次数</div><div class="v">' + status.restartedWorkers + '</div></div>'
    + '<div class="stat"><div class="k">已完成任务</div><div class="v">' + status.completedTasks + '</div></div>'
    + '<div class="stat"><div class="k">失败任务</div><div class="v">' + status.failedTasks + '</div></div>';

  const rows = (status.workers || []).map(function(w){
    const stateCls = w.state === 'busy' ? 'warn' : 'ok';
    return '<tr>'
      + '<td>' + w.workerId + '</td>'
      + '<td class="' + stateCls + '">' + esc(w.state) + '</td>'
      + '<td class="mono">' + fmt(w.currentTaskId) + '</td>'
      + '<td>' + fmt(w.processed) + '</td>'
      + '<td>' + fmt(w.failed) + '</td>'
      + '<td class="mono">' + esc(w.lastError || '-') + '</td>'
      + '<td class="mono">' + esc(w.lastSeenAt || '-') + '</td>'
      + '</tr>';
  }).join('');

  workerTable.innerHTML = '<thead><tr><th>Worker</th><th>状态</th><th>当前任务</th><th>已处理</th><th>失败</th><th>最后错误</th><th>最后心跳</th></tr></thead><tbody>' + rows + '</tbody>';
}

function renderDistributions(snapshot) {
  const src = (snapshot.sourceDistribution || []).map(function(x){ return '<span class="pill">' + esc(x.source) + ': ' + x.count + '</span>'; }).join('');
  const life = (snapshot.lifecycleDistribution || []).map(function(x){ return '<span class="pill">' + esc(x.lifecycle) + ': ' + x.count + '</span>'; }).join('');
  const rank = (snapshot.rankBoard || []).map(function(x){ return '<span class="pill">' + esc(x.rank) + ': ' + x.count + '</span>'; }).join('');
  const recruitMap = { active: 0, reserve: 0, candidate: 0 };
  let retiredCount = 0;
  (snapshot.recruitCamp || []).forEach(function(x){
    if (!x) return;
    if (x.lifecycle === 'retired') {
      retiredCount = Number(x.count || 0);
      return;
    }
    if (Object.prototype.hasOwnProperty.call(recruitMap, x.lifecycle)) {
      recruitMap[x.lifecycle] = Number(x.count || 0);
    }
  });
  const recruit = ''
    + '<span class="pill">新兵连：' + recruitMap.active + '</span>'
    + '<span class="pill">医务室：' + recruitMap.reserve + '</span>'
    + '<span class="pill">预备队：' + recruitMap.candidate + '</span>';
  const retired = '<span class="pill">已退役：' + retiredCount + '</span>';
  distributions.innerHTML = ''
    + '<div><strong>来源分布</strong><div>' + (src || '-') + '</div></div>'
    + '<div style="margin-top:8px"><strong>生命周期</strong><div>' + (life || '-') + '</div></div>'
    + '<div style="margin-top:8px"><strong>现役军衔分布</strong><div>' + (rank || '-') + '</div></div>'
    + '<div style="margin-top:8px"><strong>新兵训练营</strong><div>' + recruit + '</div></div>'
    + '<div style="margin-top:8px"><strong>已退役</strong><div>' + retired + '</div></div>';
}

function renderSimpleTable(el, headers, rows) {
  const headerHtml = headers.map(function(h){
    if (typeof h === 'string') {
      return '<th>' + esc(h) + '</th>';
    }
    const label = esc(h && h.label ? h.label : '-');
    const tip = h && h.help ? ' title="' + esc(h.help) + '"' : '';
    return '<th' + tip + '>' + label + '</th>';
  }).join('');
  el.innerHTML = '<thead><tr>' + headerHtml + '</tr></thead><tbody>' + rows.join('') + '</tbody>';
}

async function loadAll() {
  const data = await Promise.all([
    fetch('/v1/proxies/pool-status?excludeRetired=true').then(function(r){ return r.json(); }),
    fetch('/v1/proxies/ranks/board?excludeRetired=true').then(function(r){ return r.json(); }),
    fetch('/v1/proxies/recruit-camp').then(function(r){ return r.json(); }),
    fetch('/v1/proxies/honors?limit=30').then(function(r){ return r.json(); }),
    fetch('/v1/proxies/value-board?limit=100&excludeRetired=true').then(function(r){ return r.json(); }),
    fetch('/v1/proxies/policy').then(function(r){ return r.json(); }),
    fetch('/v1/proxies/events?limit=50').then(function(r){ return r.json(); }),
  ]);

  const pool = data[0];
  const ranks = data[1];
  const recruitCamp = data[2];
  const honors = data[3];
  const values = data[4];
  const policyPayload = data[5];
  const events = data[6];
  renderPool(pool.poolStatus);
  renderDistributions({
    sourceDistribution: pool.sourceDistribution,
    lifecycleDistribution: pool.lifecycleDistribution,
    rankBoard: ranks.items,
    recruitCamp: recruitCamp.items,
  });

  renderSimpleTable(honorTable, ['时间', '代理', '荣誉', '状态', '原因'], (honors.items || []).map(function(x){
    return '<tr><td class="mono">' + esc(x.awarded_at) + '</td><td>' + esc(x.display_name) + '</td><td>' + esc(x.honor_type) + '</td><td class="' + (x.active ? 'ok' : 'warn') + '">' + (x.active ? '激活' : '历史') + '</td><td>' + esc(x.reason || '-') + '</td></tr>';
  }));

  const rankHelp = buildRankHelp(policyPayload && policyPayload.policy && policyPayload.policy.ranks);
  renderSimpleTable(valueBoardTable, getValueBoardHeaders(rankHelp), (values.items || []).map(function(x, index){
    const honorText = (x.honor_active || []).join('，') || '-';
    const address = x.ip ? (x.ip + ':' + x.port + '/' + x.protocol) : '-';
    const updatedUtc = x.updated_at || '-';
    const displayName = x.display_name || '-';
    const serviceBranch = x.service_branch || '陆军';
    return ''
      + '<tr>'
      + '<td>' + (index + 1) + '</td>'
      + '<td>' + esc(displayName) + '</td>'
      + '<td>' + esc(serviceBranch) + '</td>'
      + '<td>' + esc(x.rank) + '</td>'
      + '<td class="ok">' + fmtScore(x.ip_value_score) + '</td>'
      + '<td>' + esc(x.lifecycle) + '</td>'
      + '<td>' + fmtPercent(x.success_ratio) + '</td>'
      + '<td>' + fmtPercent(x.battle_ratio) + '</td>'
      + '<td class="mono">' + fmt(x.l0_success_count) + '/' + fmt(x.l0_fail_count) + '</td>'
      + '<td class="mono">' + fmt(x.l1_success_count) + '/' + fmt(x.l1_fail_count) + '</td>'
      + '<td class="mono">' + fmt(x.l2_success_count) + '/' + fmt(x.l2_fail_count) + '</td>'
      + '<td class="mono">' + fmt(x.l3_success_count) + '/' + fmt(x.l3_fail_count) + '</td>'
      + '<td>' + esc(honorText) + '</td>'
      + '<td class="mono">' + esc(address) + '</td>'
      + '<td>' + esc(x.source) + '</td>'
      + '<td class="mono" title="UTC: ' + esc(updatedUtc) + '">' + esc(fmtLocalTime(x.updated_at)) + '</td>'
      + '<td>' + fmt(x.combat_points) + '</td>'
      + '<td>' + fmt(x.health_score) + '</td>'
      + '<td>' + fmt(x.discipline_score) + '</td>'
      + '<td>' + fmt(x.total_samples) + '</td>'
      + '</tr>';
  }));

  renderSimpleTable(eventTable, ['时间', '类型', '代理', '消息'], (events.items || []).map(function(x){
    return '<tr><td class="mono">' + esc(x.timestamp) + '</td><td>' + esc(x.event_type) + '</td><td>' + esc(x.display_name || '-') + '</td><td>' + esc(x.message) + '</td></tr>';
  }));
}

const poolStream = new EventSource('/api/runtime/thread-pools/stream');
poolStream.onmessage = function(ev) {
  const payload = JSON.parse(ev.data);
  if (payload.poolStatus) renderPool(payload.poolStatus);
};

loadAll();
setInterval(loadAll, __REFRESH_MS__);
</script>
</body>
</html>
